server:
  port: 8080

spring:
  application:
    name: spring-ai
  ai:
    #    DashScopeConnectionProperties
    dashscope:
      api-key: sk-50da44c4f24a468182538b8fdc173a5d
      chat:
        options:
          model: qwen3.6-plus
      agent:
        app-id: 0f8e9da11e24477a93fe5d0e12218881
        mcp:
          server:
            name: streamable-mcp-server2
            protocol: streamable # SSE、STREAMABLE、STATELESS
            version: 1.0.0
            type: ASYNC  # Recommended for reactive applications
            instructions: "This reactive server provides time information tools and resources"
            capabilities:
              tool: true
              resource: true
              prompt: true
              completion: true
            request-timeout: 20s
            streamable-http:
              mcp-endpoint: /mcp
              keep-alive-interval: 30s
              disallow-delete: false
